name: lucide_flutter
description: A simple Flutter package providing lucide.dev icons!
version: 1.9.0
repository: https://github.com/cliq-terminal/lucide_flutter
issue_tracker: https://github.com/cliq-terminal/lucide_flutter/issues
topics:
  - lucide
  - icons
  - flutter

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  fonts:
    - family: LucideIcons
      fonts:
        - asset: assets/lucide.ttf
